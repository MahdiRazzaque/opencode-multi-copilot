name: Bun Command

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      run_command:
        required: true
        type: string

jobs:
  run:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run command
        run: ${{ inputs.run_command }}
